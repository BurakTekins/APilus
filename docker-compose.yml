services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: apilus
      POSTGRES_USER: apilus
      POSTGRES_PASSWORD: apilus123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apilus -d apilus"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: apilus
      POSTGRES_USER: apilus
      POSTGRES_PASSWORD: apilus123
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: localonlysecretkey123
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      LLM_BASE_URL: http://vllm:8000/v1
    depends_on:
      db:
        condition: service_healthy
      vllm:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8080:8000"
    volumes:
      - models/Qwen3-4B-unsloth-4bit
    command: ["--model", "/model", "--dtype", "half", "--max-model-len", "4096"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data: