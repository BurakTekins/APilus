services:
  db:
    image: postgres:15-alpine
    container_name: apilus_db
    environment:
      POSTGRES_DB: apilus
      POSTGRES_USER: apilus
      POSTGRES_PASSWORD: apilus123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: apilus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        SERVE_PID=$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull gemma3:4b
        wait $SERVE_PID
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'gemma3:4b'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  fix-perms:
    image: busybox
    user: root
    volumes:
      - hf_cache:/app/.cache/huggingface
    command: sh -c "chown -R 1000:1000 /app/.cache/huggingface && chmod -R 755 /app/.cache/huggingface"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: apilus_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_DB: apilus
      POSTGRES_USER: apilus
      POSTGRES_PASSWORD: apilus123
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: localonlysecretkey123
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: gemma3:4b
      HF_HOME: /app/.cache/huggingface
    volumes:
      - ./RAG:/app/RAG
      - hf_cache:/app/.cache/huggingface
    depends_on:
      fix-perms:
        condition: service_completed_successfully
      db:
        condition: service_started
      ollama:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py build_rag_index --skip-if-fresh &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: apilus_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  hf_cache: