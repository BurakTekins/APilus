services:
  db:
    image: postgres:15-alpine
    container_name: apilus_db
    environment:
      POSTGRES_DB: apilus
      POSTGRES_USER: apilus
      POSTGRES_PASSWORD: apilus123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: apilus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: apilus_backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: apilus
      POSTGRES_USER: apilus
      POSTGRES_PASSWORD: apilus123
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: localonlysecretkey123
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: qwen2.5:3b
    depends_on:
      - db
      - ollama
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: apilus_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1/chat
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data: